<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: deep indigo → dark blue (AI/tech feel) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1b3e"/>
      <stop offset="100%" stop-color="#0d0e2a"/>
    </linearGradient>

    <!-- Mentor chevron gradient: warm amber (guidance/planning) -->
    <linearGradient id="mentor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Executor chevron gradient: cool cyan (execution/building) -->
    <linearGradient id="executor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>

    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: rounded square (app-icon style) -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>

  <!-- Subtle inner border for depth -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Mentor chevron (<) — left side, warm amber -->
  <path d="M 175 168 L 105 256 L 175 344"
        fill="none"
        stroke="url(#mentor)"
        stroke-width="28"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Executor chevron (>) — right side, cool cyan -->
  <path d="M 337 168 L 407 256 L 337 344"
        fill="none"
        stroke="url(#executor)"
        stroke-width="28"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Center connection: three dots representing the dialogue/collaboration loop -->
  <circle cx="226" cy="256" r="6" fill="#fbbf24" opacity="0.9"/>
  <circle cx="256" cy="256" r="6" fill="#a78bfa" opacity="0.9"/>
  <circle cx="286" cy="256" r="6" fill="#22d3ee" opacity="0.9"/>
</svg>
